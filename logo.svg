<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="yellow-btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square - green -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Shadow under document -->
  <rect x="28" y="34" width="76" height="72" rx="10" fill="#065f46" opacity="0.3"/>

  <!-- Document body -->
  <rect x="26" y="30" width="76" height="72" rx="10" fill="white"/>
  <rect x="26" y="30" width="76" height="72" rx="10" stroke="#a7f3d0" stroke-width="2"/>

  <!-- Page fold (corner) -->
  <path d="M26 38a8 8 0 0 1 8-8h30v16a8 8 0 0 0 8 8h22v48a8 8 0 0 1-8 8H34a8 8 0 0 1-8-8V38Z" fill="url(#fold)" stroke="#a7f3d0" stroke-width="1.5"/>
  <path d="M64 30v12a8 8 0 0 0 8 8h22" fill="none" stroke="#6ee7b7" stroke-width="1.5"/>

  <!-- Eyes -->
  <!-- Left eye (yellow/amber background for contrast) -->
  <circle cx="50" cy="52" r="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="50" cy="52" r="4" fill="#1f2937"/>
  <circle cx="52" cy="50" r="1.8" fill="white"/>

  <!-- Right eye -->
  <circle cx="78" cy="52" r="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="78" cy="52" r="4" fill="#1f2937"/>
  <circle cx="80" cy="50" r="1.8" fill="white"/>

  <!-- Eyebrows -->
  <path d="M40 40 Q50 36 58 42" fill="none" stroke="#047857" stroke-width="2" stroke-linecap="round"/>
  <path d="M70 42 Q78 36 88 40" fill="none" stroke="#047857" stroke-width="2" stroke-linecap="round"/>

  <!-- Blush cheeks -->
  <ellipse cx="38" cy="62" rx="5" ry="3.5" fill="#fca5a5" opacity="0.5"/>
  <ellipse cx="90" cy="62" rx="5" ry="3.5" fill="#fca5a5" opacity="0.5"/>

  <!-- Smile -->
  <path d="M56 68 Q64 80 72 68" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Crop selection rectangle on document belly -->
  <rect x="42" y="62" width="44" height="28" rx="4" fill="#059669" fill-opacity="0.08" stroke="#059669" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Crop selection corner handles (yellow) -->
  <rect x="40" y="60" width="5" height="5" rx="1.5" fill="#facc15"/>
  <rect x="83" y="60" width="5" height="5" rx="1.5" fill="#facc15"/>
  <rect x="40" y="83" width="5" height="5" rx="1.5" fill="#facc15"/>
  <rect x="83" y="83" width="5" height="5" rx="1.5" fill="#facc15"/>

  <!-- Extract button (bottom right) -->
  <circle cx="104" cy="102" r="14" fill="url(#yellow-btn)"/>
  <circle cx="104" cy="102" r="14" stroke="#ca8a04" stroke-width="1.5"/>
  <path d="M98 102 h12 M104 96 v12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
