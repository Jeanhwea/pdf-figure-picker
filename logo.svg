<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Document body (white lines representing text) -->
  <rect x="28" y="32" width="72" height="64" rx="6" fill="white" fill-opacity="0.15"/>
  <!-- Text lines -->
  <rect x="36" y="42" width="56" height="3" rx="1.5" fill="white" fill-opacity="0.9"/>
  <rect x="36" y="50" width="48" height="3" rx="1.5" fill="white" fill-opacity="0.6"/>
  <rect x="36" y="58" width="52" height="3" rx="1.5" fill="white" fill-opacity="0.6"/>
  <rect x="36" y="66" width="44" height="3" rx="1.5" fill="white" fill-opacity="0.6"/>
  <rect x="36" y="74" width="50" height="3" rx="1.5" fill="white" fill-opacity="0.6"/>
  <!-- Selection/crop box (dashed outline over text lines) -->
  <rect x="46" y="56" width="36" height="28" rx="3" fill="white" fill-opacity="0.2" stroke="white" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- Crop handles -->
  <circle cx="46" cy="56" r="3" fill="white"/>
  <circle cx="82" cy="56" r="3" fill="white"/>
  <circle cx="46" cy="84" r="3" fill="white"/>
  <circle cx="82" cy="84" r="3" fill="white"/>
</svg>
